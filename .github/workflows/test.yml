name: Test and coverage

on:
  push:
    paths:
      - '**.go'
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.22.x]
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: go get
        run: go get ./...

      - name: go mod tidy
        run: go mod tidy

      - name: Run tests
        run: make test

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          url: https://codecov-codecov.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com
          files: ./coverage.out
          flags: unit-tests
          fail_ci_if_error: false
